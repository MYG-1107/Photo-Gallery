<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Photo Gallery</title>
    <style>
        :root {
            --bg: #0f0f0f;
            --card: #1b1b1b;
            --text: #f5f5f5;
            --muted: #bdbdbd;
            --accent: #c9a66b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Inter", "Segoe UI", sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: 20px;
            padding: 80px 20px 40px;
        }

        h1 {
            font-size: clamp(2rem, 4vw, 3rem);
            letter-spacing: 0.04em;
        }

        p {
            color: var(--muted);
            max-width: 520px;
        }

        .nav-links {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        .nav-card {
            text-decoration: none;
            color: var(--text);
            background: var(--card);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 26px 30px;
            border-radius: 14px;
            min-width: 220px;
            transition: transform 0.2s ease, border 0.2s ease;
        }

        .nav-card:hover {
            transform: translateY(-6px);
            border-color: var(--accent);
        }

        .nav-card h2 {
            font-size: 1.2rem;
            margin-bottom: 8px;
            color: var(--accent);
        }

        .nav-card span {
            color: var(--muted);
            font-size: 0.95rem;
        }

        footer {
            text-align: center;
            padding: 18px 12px;
            font-size: 0.85rem;
            color: var(--muted);
            border-top: 1px solid #242424;
        }
    </style>
</head>
<body>
    <main>
        <h1>My Photo Gallery</h1>
        <p>Welcome to my personal space. Choose a gallery below to view my memories or achievements.</p>
        <div class="nav-links">
            <a class="nav-card" href="personal/">
                <h2>Personal Photos</h2>
                <span>Family, travel, and everyday moments.</span>
            </a>
            <a class="nav-card" href="achivements/">
                <h2>Achievements</h2>
                <span>Certificates, awards, and recognition.</span>
            </a>
        </div>
    </main>

    <footer>
        <p>© 2026 My Photo Gallery</p>
    </footer>
</body>
</html>
