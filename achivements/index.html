<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Achievements</title>
    <style>
        :root {
            --bg: #0f0f0f;
            --card: #1b1b1b;
            --text: #f5f5f5;
            --muted: #bdbdbd;
            --accent: #c9a66b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Inter", "Segoe UI", sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 70px 20px 40px;
            gap: 18px;
        }

        h1 {
            font-size: clamp(2rem, 4vw, 2.8rem);
        }

        p {
            color: var(--muted);
            max-width: 720px;
            text-align: center;
        }

        .back-link {
            color: var(--accent);
            text-decoration: none;
            font-size: 0.95rem;
            margin-top: 6px;
        }

        .gallery {
            width: min(1100px, 100%);
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 22px;
            margin-top: 18px;
        }

        figure {
            background: var(--card);
            border-radius: 14px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        figure img {
            width: 100%;
            height: 240px;
            object-fit: cover;
            display: block;
        }

        figcaption {
            padding: 16px;
        }

        figcaption h3 {
            margin-bottom: 6px;
            color: var(--accent);
            font-size: 1.1rem;
        }

        figcaption p {
            text-align: left;
            color: var(--muted);
            font-size: 0.95rem;
        }

        footer {
            text-align: center;
            padding: 18px 12px;
            font-size: 0.85rem;
            color: var(--muted);
            border-top: 1px solid #242424;
        }
    </style>
</head>
<body>
    <main>
        <h1>Achievements & Certificates</h1>
        <p>Here are my professional achievements, certificates, and recognition moments.</p>
        <a class="back-link" href="../index.html">← Back to Home</a>

        <section class="gallery">
            <figure>
                <img src="../A01A8129.JPG" alt="Award ceremony">
                <figcaption>
                    <h3>Award Ceremony</h3>
                    <p>Recognition received from respected leaders and mentors.</p>
                </figcaption>
            </figure>
            <figure>
                <img src="../A01A8211.JPG" alt="Certificate of excellence">
                <figcaption>
                    <h3>Certificate of Excellence</h3>
                    <p>Certification marking a major learning milestone.</p>
                </figcaption>
            </figure>
            <figure>
                <img src="../A01A8212.JPG" alt="Professional recognition">
                <figcaption>
                    <h3>Professional Recognition</h3>
                    <p>Honored for dedication and quality work.</p>
                </figcaption>
            </figure>
            <figure>
                <img src="../A01A8242.JPG" alt="Milestone moment">
                <figcaption>
                    <h3>Milestone Moment</h3>
                    <p>Celebrating progress toward my long-term goals.</p>
                </figcaption>
            </figure>
        </section>
    </main>

    <footer>
        <p>© 2026 My Photo Gallery</p>
    </footer>
</body>
</html>
