<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Photos</title>
    <style>
        :root {
            --bg: #0f0f0f;
            --card: #1b1b1b;
            --text: #f5f5f5;
            --muted: #bdbdbd;
            --accent: #c9a66b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Inter", "Segoe UI", sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 70px 20px 40px;
            gap: 18px;
        }

        h1 {
            font-size: clamp(2rem, 4vw, 2.8rem);
        }

        p {
            color: var(--muted);
            max-width: 720px;
            text-align: center;
        }

        .back-link {
            color: var(--accent);
            text-decoration: none;
            font-size: 0.95rem;
            margin-top: 6px;
        }

        .gallery {
            width: min(1100px, 100%);
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 22px;
            margin-top: 18px;
        }

        figure {
            background: var(--card);
            border-radius: 14px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        figure img {
            width: 100%;
            height: 240px;
            object-fit: cover;
            display: block;
        }

        figcaption {
            padding: 16px;
        }

        figcaption h3 {
            margin-bottom: 6px;
            color: var(--accent);
            font-size: 1.1rem;
        }

        figcaption p {
            text-align: left;
            color: var(--muted);
            font-size: 0.95rem;
        }

        footer {
            text-align: center;
            padding: 18px 12px;
            font-size: 0.85rem;
            color: var(--muted);
            border-top: 1px solid #242424;
        }
    </style>
</head>
<body>
    <main>
        <h1>Personal Photos</h1>
        <p>These are my personal memories and moments from daily life, family time, and travel.</p>
        <a class="back-link" href="../index.html">← Back to Home</a>

        <section class="gallery">
            <figure>
                <img src="../A01A8129.JPG" alt="Evening walk memory">
                <figcaption>
                    <h3>Evening Walk</h3>
                    <p>A peaceful stroll captured during a quiet evening.</p>
                </figcaption>
            </figure>
            <figure>
                <img src="../A01A8211.JPG" alt="Family celebration">
                <figcaption>
                    <h3>Family Celebration</h3>
                    <p>Smiles and togetherness from a joyful family gathering.</p>
                </figcaption>
            </figure>
            <figure>
                <img src="../A01A8212.JPG" alt="Weekend adventure">
                <figcaption>
                    <h3>Weekend Adventure</h3>
                    <p>A snapshot from a refreshing weekend trip.</p>
                </figcaption>
            </figure>
            <figure>
                <img src="../A01A8242.JPG" alt="Quiet moments">
                <figcaption>
                    <h3>Quiet Moments</h3>
                    <p>Simple, calm memories from everyday life.</p>
                </figcaption>
            </figure>
        </section>
    </main>

    <footer>
        <p>© 2026 My Photo Gallery</p>
    </footer>
</body>
</html>
